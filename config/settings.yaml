server:
  # Bind to localhost only. Public access MUST go through a reverse proxy
  # (Nginx/Caddy) that terminates HTTPS and forwards to this port.
  host: "127.0.0.1"
  port: 8321

database:
  path: ".coop/state.db"

timeouts:
  dispatch_startup: 300
  dispatch_ensure: 60
  dispatch_reconcile_grace: 30
  design_execution: 1800
  dev_execution: 3600
  review_reminder: 86400

health_check:
  interval: 60
  ssh_timeout: 5

merge:
  auto_rebase: true
  max_resume_count: 3

acpx:
  permission_mode: "approve-all"
  default_format: "json"
  ttl: 600
  json_strict: true
  model: null                      # 留空使用 agent 默认模型
  allowed_tools_design: null       # 设计阶段工具白名单（逗号分隔），null 不限制
  allowed_tools_dev: null          # 开发阶段工具白名单

turns:
  design_max_turns: 3
  dev_max_turns: 3

# DesignWork state machine bounds (Phase 3).
design:
  max_loops: 3
  execution_timeout: 600        # per-LLM-call seconds (U5)
  # When a design doc fails POST_VALIDATE, the loop re-composes the prompt
  # with these sections' names as the "missing" list.
  required_sections:
    - 用户故事
    - 用户案例
    - 详细操作流程
    - 验收标准
    - 打分 rubric
  mockup_sections:
    - 页面结构
  allow_optimize_mode: false    # v1 stubbed; flip true later

scoring:
  default_threshold: 80         # fallback when API + LLM both omit rubric_threshold (U2)

preferred_design_agent: "claude"
preferred_dev_agent: "claude"

openclaw:
  deploy_skills: true
  targets:
    - type: local
      skills_dir: "~/.openclaw/skills"
  hooks:
    enabled: false
    url: "http://127.0.0.1:18789/hooks/agent"
    # token: read from env OPENCLAW_HOOK_TOKEN; do NOT commit a real value here.
    token: ""
    default_channel: "last"
    default_to: ""

# Hermes Agent integration. Leave disabled unless you actually run hermes on
# this host. See skills/cooagents-setup/references/hermes-integration.md.
hermes:
  enabled: false
  skills_dir: "~/.hermes/skills"
  deploy_skills: true
  webhook:
    enabled: false
    url: "http://127.0.0.1:8644/webhook/cooagents"
    # secret: shared HMAC-SHA256 with hermes webhook route. Prefer env var
    # HERMES_WEBHOOK_SECRET; never commit a real value.
    secret: ""
    events: []
