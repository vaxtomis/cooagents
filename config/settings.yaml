server:
  host: "127.0.0.1"
  port: 8321

database:
  path: ".coop/state.db"

timeouts:
  dispatch_startup: 300
  dispatch_reconcile_grace: 30
  design_execution: 1800
  dev_execution: 3600
  review_reminder: 86400

health_check:
  interval: 60
  ssh_timeout: 5

merge:
  auto_rebase: true
  max_resume_count: 3

acpx:
  permission_mode: "approve-all"
  default_format: "json"
  ttl: 600
  json_strict: true
  model: null                      # 留空使用 agent 默认模型
  allowed_tools_design: null       # 设计阶段工具白名单（逗号分隔），null 不限制
  allowed_tools_dev: null          # 开发阶段工具白名单

turns:
  design_max_turns: 1
  dev_max_turns: 1

openclaw:
  deploy_skills: true
  targets:
    - type: local
      skills_dir: "~/.openclaw/skills"
  hooks:
    enabled: false
    url: "http://127.0.0.1:18789/hooks/agent"
    token: ""
    default_channel: "last"
    default_to: ""
